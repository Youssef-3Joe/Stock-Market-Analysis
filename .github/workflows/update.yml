name: Manual Stock ETL Update

on:
  workflow_dispatch: # This allows the "Manual Run" button

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas yfinance sqlalchemy pymysql cryptography

      - name: Run ETL Script
        run: python etl.py
        env:
          # We skip SQL on GitHub for now so it doesn't error out
          SKIP_SQL: "true" 

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.csv
          git commit -m "Manual Data Update: $(date)" || echo "No changes to commit"
          git push
