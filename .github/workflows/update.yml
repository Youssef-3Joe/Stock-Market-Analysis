name: StockAutoUpdate

on:
  schedule:
    - cron: '0 22 * * 1-5'  # Runs at 10 PM UTC (12 AM Cairo) Mon-Fri
  workflow_dispatch:       # This adds the "Manual Run" button

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: pip install pandas yfinance

      - name: Run ETL Script
        run: python ETL.py

      - name: Save Changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add *.csv
          git commit -m "Auto-updated stock data" || echo "No changes"
          git push
