name: Automated Stock ETL Update

on:
  workflow_dispatch: # Keeps the manual "Run" button
  schedule:
    # 9:00 PM UTC is 11:00 PM Cairo Time
    - cron: '0 21 * * *' 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pandas yfinance

      - name: Run ETL Script
        run: python ETL.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.csv
          git commit -m "Scheduled Data Update: $(date)" || echo "No changes"
          git push
